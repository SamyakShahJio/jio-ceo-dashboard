<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jio · Executive Performance Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Jio brand-derived palette */
  --jio:#0A74D6; --jio-deep:#005AAC; --jio-bright:#2E9BFF; --cyan:#1ED2F0; --cyan-deep:#0FB6D6;
  --bg0:#040C1B; --bg1:#071933; --bg2:#0A1F3D;
  --panel:rgba(255,255,255,.045); --panel-2:rgba(255,255,255,.025);
  --brd:rgba(120,170,255,.15); --brd-2:rgba(120,170,255,.09); --hi:rgba(255,255,255,.06);
  --text:#EAF1FB; --muted:#93A6C6; --muted-2:#65789A;
  --green:#2DD58A; --green-bg:rgba(45,213,138,.12);
  --amber:#FFB23E; --amber-bg:rgba(255,178,62,.13);
  --red:#FF647C;   --red-bg:rgba(255,100,124,.13);
  --grad:linear-gradient(90deg,var(--jio),var(--cyan));
  --r:16px; --r-sm:11px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  min-height:100vh; color:var(--text);
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; font-size:14px; line-height:1.45;
  background:
    radial-gradient(1100px 620px at 82% -8%, rgba(30,210,240,.13), transparent 60%),
    radial-gradient(1000px 700px at 8% 4%, rgba(10,116,214,.18), transparent 55%),
    linear-gradient(180deg,var(--bg0) 0%, var(--bg1) 55%, var(--bg0) 100%);
  background-attachment:fixed; -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:"Space Grotesk",Inter,sans-serif}
.mono{font-family:"JetBrains Mono",monospace; font-variant-numeric:tabular-nums}

/* ---------- header ---------- */
header.topbar{position:sticky; top:0; z-index:40;
  background:linear-gradient(180deg, rgba(5,14,30,.92), rgba(7,25,49,.78));
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--brd);}
.topbar::after{content:""; position:absolute; left:0; right:0; bottom:-1px; height:1px;
  background:var(--grad); opacity:.6}
.topbar-inner{max-width:1480px; margin:0 auto; padding:13px 28px; display:flex; align-items:center; gap:20px}
.brand{display:flex; align-items:center; gap:14px; min-width:0}
.mark{width:48px; height:48px; flex:none; border-radius:50%; filter:drop-shadow(0 4px 16px rgba(10,116,214,.6))}
.brand-meta{display:flex; flex-direction:column; line-height:1.2; min-width:0}
.brand-meta .office{font-family:"Space Grotesk"; font-weight:600; font-size:15px; letter-spacing:.2px}
.brand-meta .who{font-size:12px; color:var(--muted)}
.topbar-spacer{flex:1}
.fybadge{font-family:"Space Grotesk"; font-weight:600; font-size:12px; color:var(--text);
  background:rgba(46,155,255,.12); border:1px solid var(--brd); padding:7px 13px; border-radius:999px; white-space:nowrap}
.theme-btn{display:flex; align-items:center; gap:7px; font-family:"Space Grotesk"; font-weight:600; font-size:12px;
  color:var(--text); background:var(--panel); border:1px solid var(--brd); padding:7px 12px; border-radius:999px; cursor:pointer; transition:.16s; white-space:nowrap}
.theme-btn:hover{border-color:var(--cyan)}
.theme-btn .ti{display:inline-flex} .theme-btn svg{width:15px; height:15px; display:block}
.live{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); white-space:nowrap}
.dot-live{width:8px;height:8px;border-radius:50%;background:var(--cyan); box-shadow:0 0 12px var(--cyan)}
.dot-live{animation:pulse 2.2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(30,210,240,.55)}70%{box-shadow:0 0 0 8px rgba(30,210,240,0)}100%{box-shadow:0 0 0 0 rgba(30,210,240,0)}}
.clock{font-family:"JetBrains Mono"; color:var(--text); font-weight:600}

/* ---------- tabs ---------- */
nav.tabs{position:sticky; top:73px; z-index:30;
  background:rgba(6,18,38,.72); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--brd-2)}
.tabs-inner{max-width:1480px; margin:0 auto; padding:0 28px; display:flex; gap:6px}
.tab{font-family:"Space Grotesk"; font-weight:600; font-size:14px; color:var(--muted); background:transparent;
  border:0; padding:15px 18px 13px; cursor:pointer; border-bottom:2px solid transparent; transition:.18s; white-space:nowrap; position:relative}
.tab:hover{color:var(--text)}
.tab[aria-selected="true"]{color:#fff}
.tab[aria-selected="true"]::after{content:""; position:absolute; left:10px; right:10px; bottom:-1px; height:2px;
  background:var(--grad); border-radius:2px; box-shadow:0 0 10px rgba(30,210,240,.7)}

/* ---------- layout ---------- */
main{max-width:1480px; margin:0 auto; padding:24px 28px 64px}
.area-head{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin:2px 0 18px; flex-wrap:wrap}
.period-bar{display:flex; align-items:center; gap:10px}
.period-label{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted-2); font-weight:600}
.area-title .eyebrow{font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--cyan); font-weight:600}
.area-title h2{margin:3px 0 0; font-size:27px; font-weight:700; letter-spacing:-.4px}

/* sub-pills */
.subnav{display:flex; gap:9px; flex-wrap:wrap; margin:-2px 0 20px}
.pill{font-family:"Space Grotesk"; font-weight:600; font-size:13px; color:var(--muted);
  background:var(--panel); border:1px solid var(--brd-2); padding:8px 15px; border-radius:999px; cursor:pointer; transition:.16s}
.pill:hover{color:var(--text); border-color:var(--brd)}
.pill[aria-pressed="true"]{color:#fff; border-color:transparent; background:linear-gradient(90deg, rgba(10,116,214,.55), rgba(30,210,240,.4));
  box-shadow:0 0 0 1px rgba(30,210,240,.4), 0 6px 18px rgba(10,116,214,.3)}

/* panels (glass) */
.panel{background:var(--panel); border:1px solid var(--brd-2); border-radius:var(--r);
  box-shadow:0 1px 0 var(--hi) inset, 0 18px 40px rgba(2,8,20,.35); padding:18px; position:relative; overflow:hidden}
.panel::before{content:""; position:absolute; left:0; top:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(120,170,255,.35),transparent)}

/* KPI strip */
.kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px}
.kpi{padding:16px 17px}
.kpi .label{font-size:11.5px; color:var(--muted); font-weight:600; letter-spacing:.02em}
.kpi .v{font-family:"JetBrains Mono"; font-weight:700; font-size:26px; margin-top:9px; letter-spacing:-.5px; color:#fff}
.kpi .v .u{font-size:13px; color:var(--muted-2); font-weight:600; margin-left:3px}
.kpi .sub{font-size:12px; color:var(--muted); margin-top:5px; display:flex; align-items:center; gap:7px; flex-wrap:wrap}

/* sections */
.section{margin:30px 0 0}
.section-head{display:flex; align-items:center; gap:11px; margin:0 0 14px; flex-wrap:wrap}
.section-head .tag{font-family:"Space Grotesk"; font-weight:700; font-size:12px; color:#04101f;
  background:var(--grad); width:25px; height:25px; border-radius:8px; display:grid; place-items:center;
  box-shadow:0 0 14px rgba(30,210,240,.45)}
.section-head h3{margin:0; font-size:16px; font-weight:600; letter-spacing:-.2px}
.section-head .hint{font-size:12px; color:var(--muted-2)}
.section-head .spacer{flex:1}
.escal{margin-bottom:20px; padding:15px 18px 16px; border:1px solid rgba(255,178,62,.30);
  background:linear-gradient(90deg, rgba(255,178,62,.12), rgba(255,100,124,.05) 60%, transparent)}
.escal::before{background:linear-gradient(90deg,var(--amber),var(--red))}
.escal .eh{display:flex; align-items:center; gap:11px; margin-bottom:11px; flex-wrap:wrap}
.escal .etag{font-family:"Space Grotesk"; font-weight:800; font-size:14px; color:#1a0c00;
  background:linear-gradient(90deg,var(--amber),#FF8A4E); width:25px; height:25px; border-radius:8px;
  display:grid; place-items:center; box-shadow:0 0 14px rgba(255,178,62,.5)}
.escal h3{margin:0; font-size:16px; font-weight:600; letter-spacing:-.2px}
.escal .ehint{font-size:11.5px; color:var(--muted-2); margin-left:auto}
.escal ul{margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:9px}
.escal li{font-size:13px; color:var(--text); display:flex; gap:10px; line-height:1.45}
.escal li::before{content:"▸"; color:var(--amber); font-weight:700; flex:none}

/* period toggle (in performance section) */
.period{display:flex; gap:3px; background:var(--panel-2); padding:4px; border-radius:11px; border:1px solid var(--brd-2)}
.period button{font-family:"Space Grotesk"; font-weight:600; font-size:12.5px; color:var(--muted);
  background:transparent; border:0; padding:7px 13px; border-radius:8px; cursor:pointer; transition:.16s}
.period button:hover{color:var(--text)}
.period button[aria-pressed="true"]{color:#fff; background:linear-gradient(90deg, rgba(10,116,214,.6), rgba(30,210,240,.45));
  box-shadow:0 0 12px rgba(30,210,240,.35)}

.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:16px}
.grid-2-1{display:grid; grid-template-columns:1.35fr 1fr; gap:16px}
.cap{font-size:12.5px; color:var(--muted); margin:-6px 0 14px}
.cap b{color:var(--text); font-weight:600}

/* data tables */
.dt-wrap{margin-top:2px}
.dt-title{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:13px}
.dt-title .t{font-family:"Space Grotesk"; font-weight:600; font-size:14px}
.dt-title .u{font-size:11.5px; color:var(--muted-2); font-weight:600}
table.dt{width:100%; border-collapse:collapse; font-size:13px}
table.dt th{font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); font-weight:600;
  padding:0 10px 9px; text-align:right; border-bottom:1px solid var(--brd)}
table.dt th.l{text-align:left}
table.dt td{padding:10px; border-bottom:1px solid var(--brd-2); text-align:right; white-space:nowrap}
table.dt td.l{text-align:left; color:var(--muted); font-weight:500}
table.dt tr:last-child td{border-bottom:0}
table.dt .mono{color:var(--text); font-weight:600}
table.dt tr.now{background:linear-gradient(90deg, rgba(30,210,240,.10), transparent)}
table.dt tr.now td.l{color:#fff; font-weight:700; position:relative}
table.dt tr.now td.l::before{content:""; position:absolute; left:-10px; top:6px; bottom:6px; width:3px; background:var(--grad); border-radius:3px}
table.dt tr:hover td{background:rgba(255,255,255,.02)}
table.dt tfoot td{border-top:1px solid var(--brd); border-bottom:0; padding-top:12px; font-weight:700; color:#fff}
table.dt tfoot td.l{color:var(--muted); text-transform:uppercase; font-size:11px; letter-spacing:.05em; font-weight:600}
.v-up{color:var(--green); font-weight:600}
.v-down{color:var(--red); font-weight:600}
.scrollbox{max-height:360px; overflow:auto}
.scrollbox::-webkit-scrollbar{width:8px} .scrollbox::-webkit-scrollbar-thumb{background:var(--brd); border-radius:8px}
.table-x{overflow-x:auto; -webkit-overflow-scrolling:touch}
.table-x::-webkit-scrollbar{height:7px} .table-x::-webkit-scrollbar-thumb{background:var(--brd); border-radius:8px}

/* engagement table */
.eng-foot{margin-top:13px; font-size:12px; color:var(--muted); display:flex; gap:22px; flex-wrap:wrap}
.eng-foot b{font-family:"JetBrains Mono"; color:var(--text); font-weight:600}

/* status chips */
.chip{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; padding:4px 10px; border-radius:999px; white-space:nowrap}
.chip .d{width:7px;height:7px;border-radius:50%}
.chip.live{background:var(--green-bg); color:var(--green)} .chip.live .d{background:var(--green); box-shadow:0 0 8px var(--green)}
.chip.progress{background:var(--amber-bg); color:var(--amber)} .chip.progress .d{background:var(--amber)}
.chip.planned{background:rgba(120,140,170,.14); color:var(--muted)} .chip.planned .d{background:var(--muted-2)}
.chip.filled{background:var(--green-bg); color:var(--green)} .chip.filled .d{background:var(--green); box-shadow:0 0 8px var(--green)}
.chip.acting{background:var(--amber-bg); color:var(--amber)} .chip.acting .d{background:var(--amber)}
.chip.vacant{background:var(--red-bg); color:var(--red)} .chip.vacant .d{background:var(--red); box-shadow:0 0 8px var(--red)}
.health{display:inline-block; width:11px;height:11px;border-radius:50%; vertical-align:-1px}
.health.green{background:var(--green); box-shadow:0 0 9px rgba(45,213,138,.7)}
.health.amber{background:var(--amber); box-shadow:0 0 9px rgba(255,178,62,.6)}
.health.red{background:var(--red); box-shadow:0 0 9px rgba(255,100,124,.6)}

/* initiatives table */
table.tbl{width:100%; border-collapse:collapse; font-size:13px}
table.tbl th{text-align:left; font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted-2); font-weight:600; padding:0 12px 11px; border-bottom:1px solid var(--brd)}
table.tbl td{padding:13px 12px; border-bottom:1px solid var(--brd-2); vertical-align:top}
table.tbl tr:last-child td{border-bottom:0}
table.tbl tr:hover td{background:rgba(255,255,255,.02)}
table.tbl tfoot td{border-top:1px solid var(--brd); border-bottom:0; padding-top:13px; color:#fff; font-weight:700}
table.tbl tfoot td:first-child{color:var(--muted); text-transform:uppercase; font-size:11px; letter-spacing:.05em; font-weight:600}
table.tbl tfoot tr:hover td{background:transparent}
.init-name{font-weight:600; color:var(--text)}
.rk{color:var(--muted); font-size:12.5px; max-width:330px} .rk.none{color:var(--muted-2)}
.num-r{font-family:"JetBrains Mono"; font-weight:600; text-align:right; white-space:nowrap; color:var(--text)}
.th-r{text-align:right !important}
.delta{font-family:"JetBrains Mono"; font-weight:600; font-size:12px; padding:3px 8px; border-radius:999px; white-space:nowrap}
.delta.up{color:var(--green); background:var(--green-bg)} .delta.down{color:var(--red); background:var(--red-bg)}

/* org */
.org-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px}
.role{display:flex; align-items:center; gap:12px; padding:11px 13px; border:1px solid var(--brd-2); border-radius:var(--r-sm); background:var(--panel-2)}
.avatar{width:34px;height:34px;border-radius:9px; display:grid; place-items:center; flex:none;
  background:rgba(46,155,255,.14); border:1px solid var(--brd); color:var(--cyan)}
.avatar.vac{background:var(--red-bg); border-color:rgba(255,100,124,.35); color:var(--red)}
.avatar svg{width:17px;height:17px}
.role-meta{min-width:0; flex:1}
.role-meta .rname{font-weight:600; font-size:13.5px; color:var(--text)}
.role-meta .rname.ph{color:var(--muted-2); font-style:italic; font-weight:500}
.role-meta .rtitle{font-size:12px; color:var(--muted)}
.gap-row{display:grid; grid-template-columns:1.4fr repeat(3,.8fr) 1.1fr; gap:10px; align-items:center; padding:11px 4px; border-bottom:1px solid var(--brd-2); font-size:13px}
.gap-row:last-child{border-bottom:0}
.gap-row.h{font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted-2); font-weight:600; border-bottom:1px solid var(--brd)}
.gap-row .fn{font-weight:600; color:var(--text)}
.gap-row .v{font-family:"JetBrains Mono"; font-weight:600; text-align:right}
.fillbar{height:7px; border-radius:5px; background:rgba(255,255,255,.07); position:relative; overflow:hidden}
.fillbar i{position:absolute; left:0;top:0;bottom:0; border-radius:5px}
.gap-foot{display:flex; gap:22px; margin-top:15px; flex-wrap:wrap}
.gap-foot div{font-size:12px; color:var(--muted)}
.gap-foot b{font-family:"JetBrains Mono"; font-weight:700; font-size:16px; color:#fff; display:block; margin-top:2px}

/* meetings */
.meet-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px}
.meet{padding:16px}
.meet-top{display:flex; justify-content:space-between; gap:10px; align-items:flex-start}
.meet-top .mt{font-family:"Space Grotesk"; font-weight:600; font-size:14px}
.meet-top .md{font-family:"JetBrains Mono"; font-size:11.5px; color:var(--cyan); white-space:nowrap; font-weight:600}
.meet .att{font-size:12px; color:var(--muted); margin:6px 0 12px}
.meet .att b{color:var(--text); font-weight:600}
.dec{font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted-2); font-weight:600; margin:0 0 8px}
.meet ul{margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:8px}
.meet li{font-size:12.5px; color:var(--text); display:flex; gap:9px; line-height:1.4}
.meet li::before{content:""; width:6px;height:6px;border-radius:50%; background:var(--cyan); box-shadow:0 0 7px var(--cyan); margin-top:6px; flex:none}
.meet .owner{margin-top:12px; font-size:11.5px; color:var(--muted)}
.meet .owner b{color:var(--text); font-weight:600}

.note{margin-top:32px; font-size:11.5px; color:var(--muted-2); text-align:center; border-top:1px dashed var(--brd-2); padding-top:18px}

@media (max-width:1080px){
  .grid-2,.grid-2-1,.meet-grid,.org-grid{grid-template-columns:1fr}
  .kpis{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:760px){
  body{-webkit-text-size-adjust:100%}
  .topbar-inner{flex-wrap:wrap; gap:9px 12px; padding:11px 15px}
  .brand{flex:1 1 100%}
  .topbar-spacer{display:none}
  .fybadge{font-size:11px; padding:6px 11px}
  .live{font-size:11px}
  .tabs-inner,main{padding-left:14px; padding-right:14px}
  main{padding-top:18px; padding-bottom:48px}
  .area-title h2{font-size:22px}
  .subnav{gap:7px}
  .pill{font-size:12.5px; padding:8px 13px}
  .escal{padding:14px 15px 15px}
  .escal .ehint{margin-left:0; flex-basis:100%; order:5}
  .kpis{grid-template-columns:1fr 1fr; gap:11px}
  .kpi{padding:13px 13px}
  .kpi .v{font-size:21px}
  .panel{padding:15px}
  .section-head{align-items:flex-start; row-gap:2px}
  .section-head .hint{flex-basis:100%; order:5}
  .period-bar{width:100%; margin-top:4px}
  .period{width:100%; flex-wrap:wrap; gap:4px}
  .period button{flex:1 1 auto; text-align:center; padding:9px 8px}
  .grid-2,.grid-2-1,.meet-grid,.org-grid{grid-template-columns:1fr}
  table.dt{min-width:392px}
  table.tbl{min-width:640px}
  table.dt th,table.dt td{padding:9px 8px}
  table.tbl th,table.tbl td{padding:11px 9px}
  .rk{max-width:none}
  .gap-row{grid-template-columns:1.25fr .8fr .8fr .85fr}
  .gap-row .hide-sm{display:none}
  .tab{padding:14px 15px 12px; font-size:14.5px}
  .clock{font-size:11.5px}
}
@media (max-width:400px){
  .kpis{grid-template-columns:1fr}
  .area-title h2{font-size:20px}
  .theme-btn .tl{display:none}
  .theme-btn{padding:7px 9px}
  .topbar-inner{gap:8px 10px}
}
@media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}

/* =================== LIGHT THEME =================== */
body.light{
  --jio:#0A6FD6; --jio-deep:#005AAC; --jio-bright:#1E7FE0; --cyan:#0E9DBC; --cyan-deep:#0C8AA6;
  --bg0:#EEF3FB; --bg1:#FFFFFF; --bg2:#E9F0FA;
  --panel:#FFFFFF; --panel-2:#F5F8FE;
  --brd:rgba(18,66,130,.18); --brd-2:rgba(18,66,130,.11); --hi:rgba(255,255,255,.9);
  --text:#10203B; --muted:#566884; --muted-2:#8593AD;
  --green:#0E9E55; --green-bg:rgba(14,158,85,.12);
  --amber:#C07407; --amber-bg:rgba(192,116,7,.14);
  --red:#D6394B; --red-bg:rgba(214,57,75,.12);
  color:var(--text);
  background:
    radial-gradient(1100px 620px at 82% -8%, rgba(14,157,188,.10), transparent 60%),
    radial-gradient(1000px 700px at 8% 4%, rgba(10,116,214,.10), transparent 55%),
    linear-gradient(180deg,#F1F5FC 0%, #FFFFFF 55%, #EEF3FB 100%);
}
body.light header.topbar{background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(238,244,252,.85)); border-bottom-color:var(--brd)}
body.light nav.tabs{background:rgba(255,255,255,.82)}
body.light .panel{box-shadow:0 1px 0 rgba(255,255,255,.85) inset, 0 10px 26px rgba(20,55,110,.08)}
body.light .panel::before{background:linear-gradient(90deg,transparent,rgba(18,66,130,.16),transparent)}
body.light .kpi .v{color:var(--text)}
body.light .tab[aria-selected="true"]{color:var(--jio-deep)}
body.light table.dt tr.now td.l{color:var(--jio-deep)}
body.light table.dt tfoot td,

function rng(seed){let a=seed>>>0;return()=>{a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function labelsFor(period){
  const now=new Date(2026,5,17); const out=[];
  if(period==="day"){for(let i=13;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i);out.push(d.getDate()+" "+MONTHS[d.getMonth()]);}}
  else if(period==="week"){for(let i=11;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i*7);out.push("Wk of "+d.getDate()+" "+MONTHS[d.getMonth()]);}}
  else if(period==="month"){for(let i=11;i>=0;i--){const d=new Date(now);d.setMonth(now.getMonth()-i);out.push(MONTHS[d.getMonth()]+" '"+String(d.getFullYear()).slice(2));}}
  else if(period==="quarter"){out.push("Q2 FY25","Q3 FY25","Q4 FY25","Q1 FY26","Q2 FY26","Q3 FY26","Q4 FY26","Q1 FY27");}
  else {out.push("FY23","FY24","FY25","FY26","FY27");}
  return out;
}
function series(seed, metric, period, annualActual, annualPlan, bias){
  const p=PERIODS[period]; const n=p.points; const r=rng(seed + metric*131 + n*977);
  const baseA=annualActual/p.div, baseP=annualPlan/p.div; const plan=[],actual=[];
  for(let i=0;i<n;i++){

    const pv=baseP*ramp*(1+(r()-0.5)*0.03);
    const av=pv*(1+bias+(r()-0.5)*0.07);
    plan.push(pv); actual.push(av);
  }
  return {labels:labelsFor(period), plan, actual, headPlan:plan[n-1], headActual:actual[n-1]};
}

/* ---------- builders ---------- */
function perfTable(title, unit, d, dec, colLabel){
  const card=el(`<div class="panel dt-wrap"></div>`);
  card.appendChild(el(`<div class="dt-title"><span class="t">${title} — AOP plan vs actual</span><span class="u">${unit}</span></div>`));
  const n=d.labels.length; const pre=unit.startsWith("₹")?"₹":"";
  let body="";
  for(let i=n-1;i>=0;i--){
    const isNow=i===n-1; const a=d.actual[i], p=d.plan[i];
    body+=`<tr class="${isNow?'now':''}"><td class="l">${d.labels[i]}${isNow?' · current':''}</td>
      <td class="mono">${pre}${fmt(p,dec)}</td><td class="mono">${pre}${fmt(a,dec)}</td>
      <td class="mono">${a>=p?'+':'−'}${pre}${fmt(Math.abs(a-p),dec)}</td>
      <td>${varCell(a,p)}</td></tr>`;
  }
  const totP=d.plan.reduce((s,x)=>s+x,0), totA=d.actual.reduce((s,x)=>s+x,0);
  const scroll=n>10?'scrollbox':'';
  card.appendChild(el(`<div class="table-x ${scroll}"><table class="dt">
    <thead><tr><th class="l">${colLabel}</th><th>AOP plan</th><th>Actual</th><th>Variance</th><th>Var %</th></tr></thead>
    <tbody>${body}</tbody>
    <tfoot><tr><td class="l">Period total</td><td class="mono">${pre}${fmt(totP,dec)}</td><td class="mono">${pre}${fmt(totA,dec)}</td>
      <td class="mono">${totA>=totP?'+':'−'}${pre}${fmt(Math.abs(totA-totP),dec)}</td><td>${varCell(totA,totP)}</td></tr></tfoot>
  </table></div>`));
  return card;
}

function churnTable(c){
  const card=el(`<div class="panel" style="margin-top:16px"></div>`);
  card.appendChild(el(`<div class="dt-title"><span class="t">${c.title}</span><span class="u">${c.unit}</span></div>`));
  const cls={bad:"v-down",good:"v-up",flat:""};
  const rows=c.rows.map(r=>`<tr><td class="l">${r.m}</td><td class="mono">${r.v}</td><td><span class="${cls[r.t]}">${r.t==="bad"?"▲ ":r.t==="good"?"▼ ":""}${r.d}</span></td></tr>`).join("");
  card.appendChild(el(`<div class="table-x"><table class="dt">
    <thead><tr><th class="l">Metric</th><th>Current</th><th>vs plan / trend</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`));
  card.appendChild(el(`<div class="eng-foot"><span>Lower churn is better — adverse moves shown in red. Figures are placeholder.</span></div>`));
  return card;
}

function engTable(e){

  const row=(m,val,t)=>`<tr><td class="l">${m}</td><td class="mono">${val}</td><td>${trend(t)}</td></tr>`;
  const stick=e.dau&&e.mau?Math.round(e.dau/e.mau*100)+"%":"—";
  const wm=e.wau&&e.mau?Math.round(e.wau/e.mau*100)+"%":"—";
  card.appendChild(el(`<div class="table-x"><table class="dt">
    <thead><tr><th class="l">Metric</th><th>Current</th><th>WoW</th></tr></thead>
    <tbody>
      ${row("MAU — monthly active", fmt(e.mau,e.mau<10?1:0)+" "+e.mauU, e.mauT)}
      ${row("WAU — weekly active", fmt(e.wau,e.wau<10?1:0)+" "+e.mauU, e.wauT)}
      ${row("DAU — daily active", fmt(e.dau,e.dau<10?1:0)+" "+e.mauU, e.dauT)}
      ${row("Avg. session time", e.sess, e.sessT)}
    </tbody></table></div>`));
  card.appendChild(el(`<div class="eng-foot"><span>Stickiness (DAU/MAU) · <b>${stick}</b></span><span>WAU/MAU · <b>${wm}</b></span></div>`));
  return card;
}

/* ---------- wiring ---------- */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected", x===t));
  state.tab=t.dataset.tab; if(state.tab==="digital") state.sub="all"; render();
});
function tick(){const d=new Date();
  document.getElementById("clock").textContent=d.toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:true})+" IST";}
tick(); setInterval(tick,1000);

function syncSticky(){
  const h=document.querySelector("header.topbar"), n=document.querySelector("nav.tabs");
  if(h&&n) n.style.top=h.offsetHeight+"px";
}
window.addEventListener("resize",syncSticky);
window.addEventListener("load",syncSticky);
setTimeout(syncSticky,400);

const themeBtn=document.getElementById("themeBtn");
const SUN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2M12 19.5v2M4.3 4.3l1.5 1.5M18.2 18.2l1.5 1.5M2.5 12h2M19.5 12h2M4.3 19.7l1.5-1.5M18.2 5.8l1.5-1.5"/></svg>';
const MOON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M20 14.2A8 8 0 0 1 9.8 4 7 7 0 1 0 20 14.2Z"/></svg>';
let lightTheme=true;
function applyTheme(){
  document.body.classList.toggle("light",lightTheme);
  themeBtn.querySelector(".ti").innerHTML=lightTheme?MOON:SUN;
  themeBtn.querySelector(".tl").textContent=lightTheme?"Dark":"Light";
  syncSticky();
}
themeBtn.onclick=()=>{lightTheme=!lightTheme; applyTheme();};
applyTheme();

render();
syncSticky();
</script>
</body>
</html>
